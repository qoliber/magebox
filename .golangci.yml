version: "2"

run:
  modules-download-mode: readonly

formatters:
  enable:
    - gofmt
    - goimports

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
  settings:
    errcheck:
      check-type-assertions: true
    staticcheck:
      checks:
        - "all"
        - "-QF*"
        - "-ST*"
    misspell:
      locale: US
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
      - text: "Error return value of .*.Close.* is not checked"
        linters:
          - errcheck
      - text: "Error return value of `os.Remove"
        linters:
          - errcheck
