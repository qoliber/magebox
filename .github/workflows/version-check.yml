name: Check Upstream Releases

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9:00 UTC
  workflow_dispatch:

jobs:
  check-releases:
    name: Check for new Magento/MageOS releases
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for new releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Minimum versions to track — anything older is intentionally excluded
          MIN_MAGEOS="1.0.5"
          MIN_MAGENTO="2.4.6-p7"

          # Helper: compare versions (returns 0 if $1 >= $2)
          version_gte() {
            [ "$(printf '%s\n%s' "$1" "$2" | sort -V | head -n1)" = "$2" ]
          }

          echo "## Checking for new upstream releases" > report.md
          NEW_FOUND=false

          # --- MageOS ---
          echo "### MageOS" >> report.md
          MAGEOS_TAGS=$(gh api repos/mage-os/mageos-magento2/tags --paginate --jq '.[].name' | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | sort -V)
          KNOWN_MAGEOS=$(sed -n '/^mageos:/,/^[^ ]/p' lib/templates/config/versions.yaml | grep -oP 'version: "\K[0-9]+\.[0-9]+\.[0-9]+(?=")' | sort -V)

          MAGEOS_NEW=false
          for tag in $MAGEOS_TAGS; do
            if version_gte "$tag" "$MIN_MAGEOS" && ! echo "$KNOWN_MAGEOS" | grep -qx "$tag"; then
              echo "- **$tag** (new)" >> report.md
              NEW_FOUND=true
              MAGEOS_NEW=true
            fi
          done

          if [ "$MAGEOS_NEW" = "false" ]; then
            echo "- All versions up to date" >> report.md
          fi

          # --- Magento ---
          echo "### Magento Open Source" >> report.md
          MAGENTO_TAGS=$(gh api repos/magento/magento2/tags --paginate --jq '.[].name' | grep -E '^[0-9]+\.[0-9]+\.[0-9]+(-p[0-9]+)?$' | sort -V | tail -20)
          KNOWN_MAGENTO=$(sed -n '/^magento:/,/^[^ ]/p' lib/templates/config/versions.yaml | grep -oP 'version: "\K[0-9]+\.[0-9]+\.[0-9]+(-p[0-9]+)?(?=")' | sort -V)

          MAGENTO_NEW=false
          for tag in $MAGENTO_TAGS; do
            if version_gte "$tag" "$MIN_MAGENTO" && ! echo "$KNOWN_MAGENTO" | grep -qx "$tag"; then
              echo "- **$tag** (new)" >> report.md
              NEW_FOUND=true
              MAGENTO_NEW=true
            fi
          done

          if [ "$MAGENTO_NEW" = "false" ]; then
            echo "- All versions up to date" >> report.md
          fi

          echo "NEW_FOUND=$NEW_FOUND" >> $GITHUB_ENV
          cat report.md

      - name: Create issue if new versions found
        if: env.NEW_FOUND == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if an open issue already exists
          EXISTING=$(gh issue list --label "upstream-release" --state open --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "Updating existing issue #$EXISTING"
            gh issue comment "$EXISTING" --body-file report.md
          else
            gh issue create \
              --title "New upstream Magento/MageOS releases detected" \
              --body-file report.md \
              --label "upstream-release"
          fi
